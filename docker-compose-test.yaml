# Ambiente efêmero para testes backend (Postgres + Redis isolados).
# Uso:
#   docker compose -f docker-compose-test.yaml up -d
#   cd backend && npm run test:isolated
#   docker compose -f docker-compose-test.yaml down -v

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ticketz_test
      POSTGRES_PASSWORD: ticketz_test
      POSTGRES_DB: ticketz_test
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketz_test -d ticketz_test"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10
