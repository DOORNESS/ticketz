name: Deploy Ticketz — Produção

# Um único workflow: só publica o que mudou (API e/ou SPA).
# Evita 3 pipelines paralelos consumindo minutos do GitHub Actions.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "api-worker/**"
      - "functions/**"
      - "scripts/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: ticketz-prod
  cancel-in-progress: true

env:
  WORKER_NAME: fortmax-ticketz-api
  API_HOST: api.fortmax.com.br
  CF_PROJECT_NAME: fortmax-ticketz-prod
  CF_BRANCH: main
  FRONTEND_HOST: suporte.fortmax.com.br

jobs:
  detect-changes:
    name: Detectar alterações
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api-worker/**'
              - 'scripts/setup-cloudflare-api.mjs'
              - 'scripts/migrate-prod-to-vps.mjs'
              - '.github/workflows/deploy-prod.yml'
            frontend:
              - 'frontend/**'
              - 'functions/**'
              - 'scripts/setup-cloudflare-prod.mjs'

  deploy-api:
    name: API → VPS Contabo (api.fortmax.com.br)
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar secrets Cloudflare (DNS)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN ausente."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build backend
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Deploy backend na VPS Contabo
        env:
          CONTABO_PASSWORD: ${{ secrets.CONTABO_PASSWORD }}
          CONTABO_HOST: ${{ secrets.CONTABO_VPS_IP }}
        run: |
          set -euo pipefail
          if [ -z "${CONTABO_PASSWORD:-}" ]; then
            echo "::warning::CONTABO_PASSWORD ausente — deploy VPS ignorado (health check only)."
          else
            pip install pywinrm
            python3 scripts/deploy-vps-backend.py
          fi

      - name: Garantir DNS produção → VPS Contabo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          VPS_IP: ${{ secrets.CONTABO_VPS_IP }}
          API_HOST: ${{ env.API_HOST }}
        run: |
          set -euo pipefail
          node scripts/setup-cloudflare-api.mjs

      - name: Aguardar API ficar pronta (VPS)
        run: |
          set -euo pipefail
          API_URL="https://${{ env.API_HOST }}"
          for attempt in $(seq 1 18); do
            if curl -fsS --max-time 20 "${API_URL}/health" >/dev/null 2>&1; then
              echo "API health OK on attempt ${attempt}"
              curl -fsS --max-time 10 "${API_URL}/health" || true
              exit 0
            fi
            echo "Attempt ${attempt}/18: API ainda aquecendo..."
            sleep 10
          done
          echo "::error::API /health não respondeu — verifique backend na VPS Contabo."
          exit 1

      - name: Summary API
        run: |
          echo "## Ticketz API (VPS Contabo)" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.API_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy Worker/Container: **desativado** (produção na VPS)" >> $GITHUB_STEP_SUMMARY

  deploy-spa:
    name: SPA → suporte.fortmax.com.br
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provisionar Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BACKEND_ORIGIN: ${{ secrets.BACKEND_ORIGIN }}
        run: |
          set -euo pipefail
          node scripts/setup-cloudflare-prod.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build SPA
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: false
        run: npm run build

      - name: Gerar config.json de produção
        run: cp frontend/public/config-prod.json frontend/build/config.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy frontend/build
            --project-name=${{ env.CF_PROJECT_NAME }}
            --branch=${{ env.CF_BRANCH }}
            --commit-dirty=true

      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -e
          if [ -z "${CF_ZONE_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID ausente — purge ignorado."
            exit 0
          fi
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

      - name: Summary SPA
        run: |
          echo "## Ticketz SPA publicada" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.FRONTEND_HOST }}" >> $GITHUB_STEP_SUMMARY
